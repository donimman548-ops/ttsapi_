services:
  - type: web
    name: jassi-tts-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: TTS_ENGINE
        value: mock
      - key: DEFAULT_LANGUAGE
        value: en
      - key: MAX_TEXT_CHARS
        value: "1200"
      - key: API_KEY
        sync: false
